apiVersion: gateway.networking.k8s.io/v1 
kind: HTTPRoute 
metadata:
  name: digi-route 
  namespace: digi 
spec:
  - rules:
    - matches:
      path:
        type: PathPrefix 
        value: /
      filters:
        type: URLRewrite 
        urlRewrite:
          path:
            type: ReplacePathPrefixMatch
            replacePathPrefixMatch: / 
      backendRefs:
        - name: frontend-service 
          port: 4545
  