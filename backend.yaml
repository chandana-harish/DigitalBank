apiVersion: apps/v1
kind: Deployment 
metadata:
  name: mongo-digi 
  namespace: new-ns
spec: 
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      apps: back  
  template:
    metadata:
      labels:
        apps: back
  spec: 
    containers: 
      - name: mongo-cont 
        image: mongo 
        ports:
        - containerPort: 27017 
        resources:
          requests:
            memory: "400Mi"
            cpu: "100m"
          limits:
            memory: "600Mi"
            cpu: "200m"
       
---
apiVersion: v1 
kind: Service 
metadata: 
  name: mongo-ser 
  namespace : new-ns 
spec: 
  selector:
    apps: back
  ports: 
  -  targetPort:
     port:  
  type: ClusterIP 

  